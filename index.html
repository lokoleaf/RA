<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>GeoAR Indoor - 25m</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script>
    AFRAME.registerComponent('detector-chao', {
      init: function () {
        this.xrHitTestSource = null;
        this.viewerSpace = null;
        this.refSpace = null;
        this.ativo = true;
        this.el.sceneEl.renderer.xr.addEventListener('sessionstart', () => {
          let session = this.el.sceneEl.renderer.xr.getSession();
          session.requestReferenceSpace('viewer').then((space) => {
            this.viewerSpace = space;
            session.requestHitTestSource({ space: this.viewerSpace }).then((hitTestSource) => {
              this.xrHitTestSource = hitTestSource;
            });
          });
          session.requestReferenceSpace('local-floor').then((space) => {
            this.refSpace = space;
          });
        });
      },
      tick: function () {
        if (!this.ativo) return;
        let scene = this.el.sceneEl;
        if (!scene.is('ar-mode')) return;
        let frame = scene.frame;
        let session = scene.renderer.xr.getSession();
        if (!frame || !session || !this.xrHitTestSource || !this.refSpace) return;
        let hitTestResults = frame.getHitTestResults(this.xrHitTestSource);
        if (hitTestResults.length > 0) {
          let pose = hitTestResults[0].getPose(this.refSpace);
          let pos = pose.transform.position;
          this.el.setAttribute('position', { x: pos.x, y: pos.y, z: pos.z });
          this.el.setAttribute('visible', 'true');
          this.el.emit('chao-encontrado');
        } else {
          this.el.setAttribute('visible', 'false');
          this.el.emit('chao-perdido');
        }
      }
    });
  </script>
  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: #000; }
    .a-enter-vr { display: none !important; }
    #boas-vindas {
      position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
      background: #0056b3; z-index: 99999; display: flex; flex-direction: column;
      align-items: center; justify-content: center; color: white; text-align: center;
      padding: 20px; box-sizing: border-box;
    }
    #dom-overlay {
      position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: 9999; pointer-events: none; display: none;
    }
    #interface-container {
      position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(255,255,255,0.95); display: flex; flex-direction: column;
      align-items: center; justify-content: center; pointer-events: auto;
      padding: 20px;
      box-sizing: border-box;
    }
    .map-container {
      width: 90vw;
      max-width: 100%;
      overflow-x: auto;
      border: 2px solid #333;
      border-radius: 8px;
      background: #fafafa;
      margin: 10px 0;
      -webkit-overflow-scrolling: touch;
    }
    #indoor-map {
      display: block;
      background: #fafafa;
      cursor: pointer;
    }
    .map-title { font-size: 1.2rem; font-weight: bold; color: #333; text-align: center; margin-bottom: 10px; }
    #status { font-size: 1rem; color: #0056b3; font-weight: bold; background: white; padding: 5px 10px; border-radius: 20px; margin-bottom: 10px; text-align: center; }
    .btn-blue {
      margin-top: 20px; padding: 15px 30px; border: none; border-radius: 25px;
      background: #0056b3; color: white; font-weight: bold; font-size: 16px;
      cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); display: none;
    }
    #controls-ar {
      position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
      display: none; flex-direction: column; align-items: center; gap: 12px;
      pointer-events: auto; width: 90%;
    }
    #instrucao-ar {
      background: rgba(0,0,0,0.8); color: #00d2ff; padding: 12px 20px;
      border-radius: 10px; text-align: center; font-size: 15px; font-weight: bold;
      border: 1px solid #00d2ff;
    }
    .btn-ar {
      padding: 15px 35px; border: none; border-radius: 25px; font-weight: bold;
      font-size: 16px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      width: 250px; text-align: center;
    }
    #btn-ancorar { background: #2ecc71; color: white; display: none; }
    #btn-voltar { background: #e74c3c; color: white; }
    .info { font-size: 14px; margin-top: 10px; color: #333; background: #eee; padding: 5px; border-radius: 10px; text-align: center; }
  </style>
</head>
<body>

<div id="boas-vindas">
  <h2>GeoAR Indoor</h2>
  <p>(arraste o mapa)</p>
  <button class="btn-ar" style="background:#fff; color:#0056b3;" onclick="ativarSessaoXR()">Acessar Prédio</button>
</div>

<div id="dom-overlay">
  <div id="interface-container">
    <div class="map-title">Selecione a Rota</div>
    <div id="status">🔵 Clique na ORIGEM primeiro</div>
    <div class="map-container" id="map-container">
      <canvas id="indoor-map"></canvas>
    </div>
    <button class="btn-blue" id="btn-iniciar-ar" onclick="irParaVisaoCamera()">Iniciar Navegação AR</button>
    <div class="info">👆 Arraste o mapa | Toque exatamente sobre o círculo desejado</div>
  </div>
  <div id="controls-ar">
    <div id="instrucao-ar">Mova o celular olhando para o chão...</div>
    <button class="btn-ar" id="btn-ancorar">Fixar Rota Aqui</button>
    <button class="btn-ar" id="btn-voltar" onclick="alternarMapaInterno()">Mudar de Rota</button>
  </div>
</div>

<a-scene
  webxr="requiredFeatures: hit-test, local-floor; optionalFeatures: dom-overlay; overlayElement: #dom-overlay"
  vr-mode-ui="enabled: false"
  renderer="antialias: true; alpha: true">
  <a-entity id="reticulo" detector-chao visible="false">
    <a-ring color="#00FF00" radius-inner="0.1" radius-outer="0.15" rotation="-90 0 0"></a-ring>
  </a-entity>
  <a-entity id="rota-container" visible="false"></a-entity>
  <a-camera position="0 1.6 0"></a-camera>
</a-scene>

<script>
  // ======================= PONTOS REAIS (metros) - Total 25 metros =======================
  const pontosReais = [
    { name: "4050F", xReal: 0,     color: "#e74c3c", id: "sala1" },
    { name: "4054F", xReal: 7.8125, color: "#3498db", id: "sala2" },
    { name: "4058F", xReal: 14.0625, color: "#2ecc71", id: "sala3" },
    { name: "4064F", xReal: 18.75, color: "#f39c12", id: "sala4" },
    { name: "Banheiro ♀", xReal: 25, color: "#9b59b6", id: "fem" }
  ];

  const escala = 30;          // 30 pixels por metro
  const margemLateral = 30;   // aumentado para dar mais espaço

  const minXReal = Math.min(...pontosReais.map(p => p.xReal));
  const maxXReal = Math.max(...pontosReais.map(p => p.xReal));
  const larguraPixels = (maxXReal - minXReal) * escala + margemLateral * 2;
  const canvasHeight = 250;

  function realToPixel(xReal) {
    const offsetX = margemLateral - minXReal * escala;
    return offsetX + xReal * escala;
  }

  let pontos = [];
  function atualizarPontos2D() {
    pontos = pontosReais.map(p => ({
      name: p.name,
      x2d: realToPixel(p.xReal),
      y2d: 150,
      color: p.color,
      id: p.id,
      xReal: p.xReal
    }));
  }

  // Elementos DOM
  const canvas = document.getElementById('indoor-map');
  const ctx = canvas.getContext('2d');
  const mapContainer = document.getElementById('map-container');
  const statusText = document.getElementById('status');
  const btnIniciarAR = document.getElementById('btn-iniciar-ar');
  const boasVindas = document.getElementById('boas-vindas');
  const domOverlay = document.getElementById('dom-overlay');
  const interfaceContainer = document.getElementById('interface-container');
  const controlsAR = document.getElementById('controls-ar');
  const scene = document.querySelector('a-scene');
  const reticulo = document.getElementById('reticulo');
  const btnAncorar = document.getElementById('btn-ancorar');
  const instrucao = document.getElementById('instrucao-ar');
  const rotaContainer = document.getElementById('rota-container');

  let origem = null;
  let destino = null;
  let etapa = 'origem';

  function redimensionarCanvas() {
    canvas.width = larguraPixels;
    canvas.height = canvasHeight;
    canvas.style.width = `${larguraPixels}px`;
    canvas.style.height = `${canvasHeight}px`;
    drawMap();
  }

  function drawMap() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const xInicioCorredor = realToPixel(minXReal);
    const xFimCorredor = realToPixel(maxXReal);
    ctx.lineWidth = 40;
    ctx.strokeStyle = '#e0e0e0';
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(xInicioCorredor, 150);
    ctx.lineTo(xFimCorredor, 150);
    ctx.stroke();

    pontos.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x2d, p.y2d, 15, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#000';
      ctx.font = '14px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(p.name, p.x2d, p.y2d - 22);
    });

    if (origem && destino) {
      ctx.lineWidth = 4;
      ctx.strokeStyle = '#0056b3';
      ctx.setLineDash([10, 10]);
      ctx.beginPath();
      ctx.moveTo(origem.x2d, origem.y2d);
      ctx.lineTo(destino.x2d, destino.y2d);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.arc(origem.x2d, origem.y2d, 18, 0, Math.PI * 2);
      ctx.strokeStyle = 'white';
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(destino.x2d, destino.y2d, 18, 0, Math.PI * 2);
      ctx.strokeStyle = 'gold';
      ctx.lineWidth = 3;
      ctx.stroke();
    } else if (origem) {
      ctx.beginPath();
      ctx.arc(origem.x2d, origem.y2d, 18, 0, Math.PI * 2);
      ctx.strokeStyle = 'white';
      ctx.lineWidth = 3;
      ctx.stroke();
    }
  }

  function centralizarMapa() {
    if (!mapContainer || canvas.width === 0) return;
    const centroCanvas = canvas.width / 2;
    const containerWidth = mapContainer.clientWidth;
    const scrollPos = centroCanvas - containerWidth / 2;
    mapContainer.scrollLeft = Math.max(0, scrollPos);
  }

  function getCanvasXFromClick(clientX) {
    const rect = canvas.getBoundingClientRect();
    const scrollLeft = mapContainer.scrollLeft;
    let x = clientX - rect.left + scrollLeft;
    return Math.min(Math.max(x, 0), canvas.width);
  }

  // Raio de detecção reduzido para 20px (preciso)
  const RAIO_DETECCAO = 20;

  function encontrarPontoPorPixel(pixelX) {
    let menorDist = RAIO_DETECCAO;
    let pontoEncontrado = null;
    for (let p of pontos) {
      const dx = Math.abs(pixelX - p.x2d);
      if (dx < menorDist) {
        menorDist = dx;
        pontoEncontrado = p;
      }
    }
    return pontoEncontrado;
  }

  canvas.addEventListener('click', (event) => {
    const pixelX = getCanvasXFromClick(event.clientX);
    const pontoClicado = encontrarPontoPorPixel(pixelX);
    if (!pontoClicado) return;

    if (etapa === 'origem') {
      origem = pontoClicado;
      destino = null;
      statusText.innerText = `✅ Origem: ${origem.name}. Agora clique no DESTINO.`;
      etapa = 'destino';
      btnIniciarAR.style.display = 'none';
      drawMap();
    } else {
      if (pontoClicado === origem) {
        statusText.innerText = "⚠️ Destino não pode ser igual à origem. Escolha outro destino.";
        return;
      }
      destino = pontoClicado;
      statusText.innerText = `🗺️ Rota: ${origem.name} → ${destino.name}. Pronto para navegar.`;
      etapa = 'origem';
      btnIniciarAR.style.display = 'block';
      drawMap();
    }
  });

  function resetarSelecao() {
    origem = null;
    destino = null;
    etapa = 'origem';
    statusText.innerText = "🔵 Clique na ORIGEM primeiro";
    btnIniciarAR.style.display = 'none';
    drawMap();
  }

  // AR Functions
  function ativarSessaoXR() {
    if (scene.enterAR) scene.enterAR();
    else scene.enterVR();
  }

  scene.addEventListener('enter-vr', function () {
    if (scene.is('ar-mode')) {
      boasVindas.style.display = 'none';
      domOverlay.style.display = 'block';
      interfaceContainer.style.display = 'flex';
      setTimeout(centralizarMapa, 100);
    }
  });

  function irParaVisaoCamera() {
    if (!origem || !destino) {
      alert("Selecione a origem e o destino primeiro!");
      return;
    }
    interfaceContainer.style.display = 'none';
    controlsAR.style.display = 'flex';
  }

  reticulo.addEventListener('chao-encontrado', () => {
    instrucao.innerText = "Chão detectado! Fixe a rota.";
    btnAncorar.style.display = 'block';
  });
  reticulo.addEventListener('chao-perdido', () => {
    instrucao.innerText = "Mova o celular olhando para o chão...";
    btnAncorar.style.display = 'none';
  });

  function gerarRotaAR(origemReal, destinoReal, nomeDestino, corDestino) {
    rotaContainer.innerHTML = "";
    const xInicio = origemReal.xReal;
    const xFim = destinoReal.xReal;
    const passo = 0.4;
    const distancia = Math.abs(xFim - xInicio);
    const direcao = Math.sign(xFim - xInicio);
    let pontosRota = [];
    for (let x = xInicio + passo * direcao; Math.abs(x - xInicio) <= distancia; x += passo * direcao) {
      pontosRota.push({ x: parseFloat(x.toFixed(2)), z: 0 });
    }
    if (pontosRota.length === 0 || Math.abs(pontosRota[pontosRota.length-1]?.x - xFim) > 0.1) {
      pontosRota.push({ x: xFim, z: 0 });
    }
    pontosRota.forEach(p => {
      let migalha = document.createElement('a-cylinder');
      migalha.setAttribute('position', `${p.x} 0.02 ${p.z}`);
      migalha.setAttribute('radius', '0.08');
      migalha.setAttribute('height', '0.01');
      migalha.setAttribute('color', '#00d2ff');
      migalha.setAttribute('opacity', '0.9');
      rotaContainer.appendChild(migalha);
    });
    let destinoMarker = document.createElement('a-entity');
    destinoMarker.setAttribute('position', `${xFim} 0 0`);
    destinoMarker.innerHTML = `
      <a-cylinder color="${corDestino}" height="0.6" radius="0.12" position="0 0.05 0.3" rotation="90 0 0"></a-cylinder>
      <a-cone color="${corDestino}" height="0.4" radius-bottom="0.25" position="0 0.05 -0.2" rotation="-90 0 0"></a-cone>
      <a-text value="${nomeDestino}" color="white" align="center" position="0 0.6 0" scale="0.5 0.5 0.5"></a-text>
    `;
    rotaContainer.appendChild(destinoMarker);
  }

  btnAncorar.addEventListener('click', () => {
    if (!origem || !destino) return;
    const posAncora = reticulo.getAttribute('position');
    const rotAncora = reticulo.getAttribute('rotation');
    rotaContainer.setAttribute('position', posAncora);
    rotaContainer.setAttribute('rotation', rotAncora);
    const origemReal = pontosReais.find(p => p.id === origem.id);
    const destinoReal = pontosReais.find(p => p.id === destino.id);
    gerarRotaAR(origemReal, destinoReal, destino.name, destino.color);
    rotaContainer.setAttribute('visible', 'true');
    if (reticulo.components['detector-chao']) reticulo.components['detector-chao'].ativo = false;
    reticulo.setAttribute('visible', 'false');
    instrucao.innerText = "Navegando! Siga as marcas azuis.";
    btnAncorar.style.display = 'none';
  });

  function alternarMapaInterno() {
    resetarSelecao();
    rotaContainer.setAttribute('visible', 'false');
    rotaContainer.innerHTML = "";
    controlsAR.style.display = 'none';
    if (reticulo.components['detector-chao']) reticulo.components['detector-chao'].ativo = true;
    interfaceContainer.style.display = 'flex';
    drawMap();
    setTimeout(centralizarMapa, 100);
  }

  window.addEventListener('load', () => {
    atualizarPontos2D();
    redimensionarCanvas();
    centralizarMapa();
    window.addEventListener('resize', () => centralizarMapa());
  });
</script>
</body>
</html>
